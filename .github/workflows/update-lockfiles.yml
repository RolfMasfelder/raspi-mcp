name: Regenerate lockfiles after Dependabot update

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "pyproject.toml"

jobs:
  update-lockfiles:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.PR_CREATION_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Regenerate requirements.txt
        run: pip-compile --no-emit-options --output-file=requirements.txt pyproject.toml

      - name: Regenerate requirements-dev.txt
        run: pip-compile --extra=dev --no-emit-options --output-file=requirements-dev.txt pyproject.toml

      - name: Commit lockfiles if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add requirements.txt requirements-dev.txt
          git diff --staged --quiet || (
            git commit -m "chore: regenerate lockfiles after dependabot update" &&
            git push
          )

      - name: Approve and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.PR_CREATION_TOKEN }}
        run: |
          gh pr review "${{ github.event.pull_request.number }}" --approve
          gh pr merge "${{ github.event.pull_request.number }}" --auto --merge
