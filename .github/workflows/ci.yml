name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          # gpiozero is pre-installed on the Pi; install explicitly here so
          # LED and server tests are not silently skipped via importorskip.
          pip install gpiozero

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest
