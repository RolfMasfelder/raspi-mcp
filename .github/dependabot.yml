version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # PRs target main directly (not dev): dev is the active working branch and
    # must not be rebased/altered by Dependabot while feature work is in progress.
    # Releases go dev → main via PR; Dependabot bumps land on main independently
    # and get pulled back into dev on the next dev → main sync.
    target-branch: "main"
    # Only bump direct dependencies (declared in pyproject.toml).
    # Transitive/indirect pins (e.g. pydantic-core via pydantic) must stay in
    # sync with their parent package and are regenerated by pip-compile in
    # update-lockfiles.yml, not bumped independently by Dependabot.
    allow:
      - dependency-type: "direct"
